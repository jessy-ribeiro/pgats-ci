# CI de Nível 01 - Disparo Manual através de clique 

# nome da pipeline
name: 'Execução Manual' 

# gatilhos/ triggers - Regras de Disparo
# gatilho manual = workflow dispatch

on:
  workflow dispatch:

  # Tarefas dentro da Pipeline
  jobs:
    #nome do job
    e2e-tests:
      #maquina onde o job vai rodar
      runs-on: ubuntu-latest

      #passos do job
      steps:
        #clone do projeto
        - uses: actions/checkout@v4

        #instalção do node
        - uses: actions/setup-node@v4
          with:
          node-version: 24.x

          #instalação do yarn
        - name: Instalando yarn
          run: npm install -g yarn

          # Instalando dependências
        - name: Instalando dependências
          run: yarn

          # instalação dos browser do Playwright
        - name: Instalando browser do Playwright
          run: yarn playwright install
         
          # execução dos testes e2e
        - name: Executando os testes e2e
          run: yarn run e2e